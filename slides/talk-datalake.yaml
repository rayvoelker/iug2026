meta:
  title: "Building a Data Lake for Your Library"
  subtitle: "Early Experiments at CHPL"
  description: "Building a Data Lake for Your Library: Early Experiments at Cincinnati & Hamilton County Public Library - IUG 2026"
  keywords: "Ray Voelker, Cincinnati & Hamilton County Public Library, IUG, IUG 2026, Data Lake, DuckDB, DuckLake, Parquet, Sierra, MARC, ETL, Python"
  author: "Ray Voelker"
  institution: "Cincinnati &amp; Hamilton County Public Library"
  email: "ray.voelker@chpl.org"
