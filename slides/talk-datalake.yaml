  - type: content
    title: "The Stack"
    bullets:
      - '<strong>Python</strong> &mdash; extraction scripts, MARC parsing (pymarc)'
      - '<strong>Parquet</strong> &mdash; open columnar format, compressed with zstd'
      - '<strong>DuckDB</strong> &mdash; fast analytical queries, no server needed'
      - '<strong>DuckLake</strong> &mdash; versioned storage with snapshots'
    notes: |
      All free, all open source. A laptop can query millions
      of records. No heavy infrastructure needed.

  # =============================================
  # THE ILS HARVEST
  # =============================================

  - type: content
    title: "Harvesting the ILS: sierra-marc-harvest"
    bullets:
      - "Open source Python CLI for Sierra ILS"
      - "Extracts MARC records via the Sierra REST API"
      - "Incremental updates &mdash; only fetches what changed"
      - "Declarative YAML profiles &mdash; institution-agnostic"
      - "Stores everything in compressed Parquet files"
    link:
      url: "https://github.com/chimpy-me/ils-lake"
      text: "github.com/chimpy-me/ils-lake"
    no_iframe: true
    notes: |
      This is the piece that's furthest along. Real code,
      real tests, real data flowing through it.

  - type: content
    title: "What Gets Extracted"
    custom_html: |
      <div style="display: flex; gap: 2em; font-size: 0.65em;">
        <div style="flex: 1;">
          <h3 style="color: #0C2340;">Bibs (19 fields)</h3>
          <ul>
            <li>Title, author, publisher</li>
            <li>Call number, ISBN, OCLC#</li>
            <li>Subject headings, genres</li>
            <li>Material type, bib level</li>
            <li>Pub year, cataloging date</li>
            <li>Complete MARC as JSON</li>
          </ul>
        </div>
        <div style="flex: 1;">
          <h3 style="color: #0C2340;">Items (17 fields)</h3>
          <ul>
            <li>Barcode, location, item type</li>
            <li>Status, call number</li>
            <li>Checkout &amp; renewal totals</li>
            <li>Last checkout / checkin dates</li>
            <li>Price, copy number, volume</li>
          </ul>
        </div>
      </div>
    notes: |
      The extraction profile is YAML — each library can
      define exactly which MARC fields to pull. CHPL's
      default profile extracts 36 fields across bibs and items.

  - type: content
    title: "The Extraction Profile"
    subtitle: "Declarative YAML &mdash; no code changes needed"
    code:
      language: yaml
      body: |
        tables:
          bibs:
            fields:
              title:
                source: 245$a$b
              author:
                source: [100$a, 110$a, 111$a]
                transform: first_available
              pub_year:
                source: 008[7:11]
                type: int16
              language:
                source: 008[35:38]
    notes: |
      This is the real profile format. Any Sierra library
      can write their own profile to match their local fields.
      Press ↓ for more detail on transforms.
    subslides:
      - title: "Profile Deep Dive: Selectors"
        subtitle: "Backup slide &mdash; for Q&amp;A"
        custom_html: |
          <div style="font-size: 0.55em;">
            <p>MARC addressing grammar &mdash; point at the data you want:</p>
            <table style="width: 100%;">
              <thead>
                <tr>
                  <th>Syntax</th>
                  <th>Meaning</th>
                  <th>Example</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td><code>245$a$b</code></td>
                  <td>Subfields, concatenated</td>
                  <td>Title + subtitle</td>
                </tr>
                <tr>
                  <td><code>008[7:11]</code></td>
                  <td>Control field slice</td>
                  <td>Publication year</td>
                </tr>
                <tr>
                  <td><code>[100$a, 110$a, 111$a]</code></td>
                  <td>First available source</td>
                  <td>Author (personal, corporate, or meeting)</td>
                </tr>
                <tr>
                  <td><code>6XX$a</code></td>
                  <td>Wildcard &mdash; all matching fields</td>
                  <td>All subject headings (650, 651, etc.)</td>
                </tr>
              </tbody>
            </table>
          </div>
        notes: |
          The selector grammar lets you address any part of a
          MARC record. Wildcards like 6XX match all fields in
          that range.

      - title: "Profile Deep Dive: Transforms"
        subtitle: "Backup slide &mdash; for Q&amp;A"
        custom_html: |
          <div style="font-size: 0.5em;">
            <p>Transforms are <strong>plain Python functions</strong> registered by name.
            Chainable: <code>transform: [first_available, rstrip]</code></p>
            <div style="display: flex; gap: 2em;">
              <div style="flex: 1;">
                <h3 style="color: #0C2340;">Value Transforms</h3>
                <ul>
                  <li><code>sierra_id</code> &mdash; parse <code>.b12345678x</code> to numeric ID</li>
                  <li><code>sierra_date</code> &mdash; <code>MM-DD-YY</code> &rarr; ISO 8601</li>
                  <li><code>sierra_datetime</code> &mdash; with time component</li>
                  <li><code>price_cents</code> &mdash; <code>$11.16</code> &rarr; <code>1116</code></li>
                  <li><code>rstrip</code>, <code>strip</code>, <code>normalize_text</code></li>
                  <li><code>s/pattern/replacement/</code> &mdash; inline regex</li>
                </ul>
              </div>
              <div style="flex: 1;">
                <h3 style="color: #0C2340;">List Transforms</h3>
                <ul>
                  <li><code>first_available</code> &mdash; pick first non-empty value from multiple sources</li>
                  <li><code>collect_piped</code> &mdash; gather repeating fields into <code>Floods|Floods (1937)|Floods (1913)</code></li>
                </ul>
                <h3 style="color: #0C2340; margin-top: 0.8em;">Customization</h3>
                <ul>
                  <li>Add a Python function to <code>transforms.py</code></li>
                  <li>Register it in the <code>TRANSFORMS</code> dict</li>
                  <li>Reference by name in your YAML profile</li>
                  <li>Validated at profile load time</li>
                </ul>
              </div>
            </div>
          </div>
        notes: |
          10 built-in transforms in the registry, plus
          inline regex. Each is a plain Python function
          taking (value, args). Adding a custom one is:
          write the function, register it, use by name in
          YAML. Validated at load time so typos fail fast.

  # =============================================
  # WHY PARQUET + DUCKDB
  # =============================================

  - type: content
    title: "Why Parquet + DuckDB?"
    bullets:
      - '<span class="accent">Parquet</span>: columnar, compressed &mdash; a fraction of the size of raw exports'
      - '<span class="accent">DuckDB</span>: analytical SQL engine, runs on a laptop'
      - "No heavy infrastructure &mdash; DuckDB is embedded, catalog can be SQLite"
      - "Same ecosystem as data science and journalism"
      - "Query across tables, across sources &mdash; just SQL"
    notes: |
      The Datasette talk was about SQLite. This is the next
      step: Parquet for storage, DuckDB for queries. Same
      idea — files, not servers — but built for analytics.

  - type: content
    title: "DuckLake: Version Your Data"
    bullets:
      - >-
        <a href="https://ducklake.select/">DuckLake</a> &mdash;
        an open data lake format from the DuckDB Foundation
      - "Every harvest creates a lightweight snapshot with metadata"
      - "Query your collection <em>as it was</em> on any date"
      - "Track changes over time &mdash; what was added, modified, deleted"
      - "Built-in retention policies &mdash; expire old snapshots, reclaim storage"
    link:
      url: "https://ducklake.select/"
      text: "ducklake.select"
    no_iframe: true
    notes: |
      This is the piece that ties it together. DuckLake gives
      you the structured snapshots with proper metadata that
      make a data lake actually useful over time.

  # =============================================
  # OTHER DATA SOURCES
  # =============================================

  - type: content
    title: "Beyond the ILS: OverDrive Checkouts"
    bullets:
      - "Separate ETL pulls digital checkout data from OverDrive API"
      - "Currently stores raw API responses &mdash; next step is Parquet"
      - "The goal: join ILS + OverDrive data in the same lake"
      - '<span class="accent">One query</span> to compare physical and digital circulation'
    link:
      url: "https://github.com/cincinnatilibrary/chpl-etl-overdrive-checkouts"
      text: "github.com/cincinnatilibrary/chpl-etl-overdrive-checkouts"
    no_iframe: true
    notes: |
      This is lighter-weight than the ILS harvest. The point
      is: once you have the pattern, adding sources is easy.

  # =============================================
  # STATUS & VISION
  # =============================================

  - type: content
    title: "Where We Are (Honestly)"
    bullets:
      - 'Sierra ILS harvest: working, tested &mdash; extracting real data into a test data lake'
      - 'OverDrive ETL: working prototype &mdash; storing snapshots in Python pickle data on disk'
      - 'Connecting the pieces into a unified lake: in progress'
      - 'This is early &mdash; sharing the concept, not a finished product'
    notes: |
      Be honest about the state. The harvest tool is solid.
      The lake concept is the vision we're building toward.

  - type: content
    title: "What's Next"
    bullets:
      - "More data sources &mdash; holds, circ history, patron demographics"
      - "Pre-built queries and dashboards (Datasette or similar)"
      - "Scheduled harvests via systemd timers or cron"
      - "Documentation + packaging for other Sierra libraries"
    notes: |
      Keep this brief. The roadmap is aspirational — this
      talk is about the idea and the early work, not promises.

  # =============================================
  # CLOSING
  # =============================================

  - type: content
    title: "The Takeaway"
    bullets:
      - "Your library data doesn't have to live in silos"
      - "Open formats + free tools = a real data lake on a budget"
      - "Start small &mdash; one pipeline, one data source"
      - "The pattern scales: add sources as you go"
    # footer_text: "If you can run Datasette, you can build a data lake."
    notes: |
      Circle back to the Datasette theme. This is the next
      step on the same journey.

  - type: content
    title: "Resources"
    links_list:
      - url: "https://github.com/chimpy-me/ils-lake"
        text: "github.com/chimpy-me/ils-lake &mdash; sierra-marc-harvest"
      - url: "https://github.com/cincinnatilibrary/chpl-etl-overdrive-checkouts"
        text: "github.com/cincinnatilibrary/chpl-etl-overdrive-checkouts &mdash; OverDrive ETL"
      - url: "https://duckdb.org/"
        text: "duckdb.org &mdash; DuckDB"
      - url: "https://ducklake.select/"
        text: "ducklake.select &mdash; DuckLake (open data lake format)"
      - url: "https://parquet.apache.org/"
        text: "parquet.apache.org &mdash; Apache Parquet"

  - type: closing
    title: "Thanks!"
    body: |
      Questions? Ideas? Other data sources you'd want in your lake?
      <br><br>
      This is early-stage work &mdash; feedback welcome!
