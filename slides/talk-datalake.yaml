slides:

  # =============================================
  # INTRODUCTION
  # =============================================

  - type: title
    title: "Building a Data Lake for Your Library"
    title_style: "font-size: 1.3em;"
    subtitle: "Early Experiments at CHPL"

  - type: content
    title: "Previously ..."
    bullets:
      - 'Datasette + SQLite = great for <em>browsing</em> a single dataset'
      - "Collection analysis, Newsdex &mdash; each a standalone tool"
      - "But what if you want to ask questions across <em>all</em> your data?"
    notes: |
      Quick callback to the Datasette talks. Set up the problem:
      each dataset lives in its own silo.

  # =============================================
  # THE PROBLEM
  # =============================================

  - type: content
    title: "The Real Problem: Data Never Sits Still"
    bullets:
      - "Your ILS isn't a static database &mdash; it's constantly churning"
      - "Items are added, weeded, checked out, status codes change &mdash; every day"
      - "Digital platforms (OverDrive) have their own moving data"
      - >-
        To analyze any of this properly, you need
        <span class="accent">structured snapshots at regular intervals</span>
    notes: |
      Reframe: the problem isn't just that data is in different
      systems. It's that everything is changing all the time and
      you can't analyze a moving target.

  - type: content
    title: "What's Missing Today"
    bullets:
      - "Pulling a report today? Great. Comparing it to last month? Hard."
      - "No consistent snapshots &mdash; just ad-hoc exports when someone asks"
      - "No metadata about <em>when</em> or <em>how</em> the data was captured"
      - "Changes vanish &mdash; once a record is updated, the old version is gone"
    notes: |
      This is the pain point. Libraries have data, but no
      structured way to capture it over time. Every report
      is a one-off snapshot with no history.

  # =============================================
  # WHAT'S A DATA LAKE?
  # =============================================

  - type: content
    title: "What's a Data Lake?"
    bullets:
      - "A central repository for structured data from many sources"
      - "Snapshot at regular intervals with <em>proper metadata</em>"
      - '<span class="accent">Open formats</span> (Parquet, not proprietary exports)'
      - "Not a data warehouse &mdash; lighter, cheaper, more flexible"
      - "Built-in history &mdash; every snapshot is preserved"
    notes: |
      Key idea: a data lake isn't just storage. It's structured,
      versioned storage with metadata. You can always go back
      and see what the data looked like at any point in time.

  - type: content
    title: "Data Sovereignty"
    bullets:
      - '<span class="accent">Your data belongs to you &mdash; not a vendor</span>'
      - "Library vendors control how you access your own data"
      - "Proprietary formats, limited exports, API restrictions"
      - "A data lake puts <em>you</em> in control &mdash; open formats, your infrastructure"
      - "If you switch vendors, your data lake stays"
    notes: |
      This is the slide that should resonate. Libraries pay
      for systems that hold their data hostage. A data lake
      is an assertion of ownership over your own data.

  # =============================================
  # WHAT WE'RE BUILDING
