meta:
  title: "I &#10084;&#65039; Datasette"
  subtitle: "From ILS Snapshots to a $5/Month Analysis Platform"
  description: "I Love Datasette: From ILS Snapshots to a $5/Month Analysis Platform - IUG 2026"
  keywords: "Ray Voelker, Cincinnati & Hamilton County Public Library, IUG, IUG 2026, Datasette, Python, SQLite, SQL, Collection Analysis"
  author: "Ray Voelker"
  institution: "Cincinnati &amp; Hamilton County Public Library"
  email: "ray.voelker@chpl.org"
  filename: "talk1-datasette-at-the-library.html"

slides:

  - type: title
    title: "I &#10084;&#65039; Datasette"
    subtitle: "From ILS Snapshots to a $5/Month Analysis Platform"

  - type: content
    title: "Your Data Is Trapped"
    bullets:
      - "Libraries sit on TONS of structured data"
      - "ILS systems weren't designed for flexible, ad-hoc analysis"
      - >-
        Staff (and, it turns out Patrons) want easier access
        to catalog data so they end up:
    sub_bullets:
      - "Wrestling with complicated extraction / transform / load steps (ETL)"
      - "Rely on one or two library staff to produce reports or feed them data"
      - >-
        Scrape the Public WebPAC
        <em>(this is especially bad)</em>
    bullets_after:
      - >-
        The people who know the collection best often have
        the <em>least</em> direct access to the data
    notes: |
      On scraping: Riley Walz's "Library Spy" (walzr.com/library-spy)
      scrapes NYPL availability to show real-time checkouts. It went viral.
      The point: if you don't publish your data, people scrape your WebPAC.
      Datasette gives you a proper API instead.

  - type: content
    title: "What If You Could Just... Explore It?"
    bullets:
      - "Browse the entire collection in a web browser"
      - "Filter by location, format, status, date &mdash; instantly"
      - "Run pre-built queries without writing SQL"
      - "Export results to CSV"
      - "Access a JSON API for advanced use"
    link:
      url: "https://collection-analysis.cincy.pl/"
      text: "collection-analysis.cincy.pl"
    notes: |
      "That's exactly what we built — and it costs $5/month to run."

  - type: content
    title: "What is Datasette?"
    bullets:
      - 'Created by Simon Willison (co-creator of Django)'
      - '"A tool for exploring and publishing data"'
      - >-
        Aimed at <span class="accent">journalists</span>,
        <span class="accent">museum curators</span>,
        <span class="accent">archivists</span>,
        <span class="accent">local governments</span>,
        and <span class="accent">anyone else who has data</span>
      - "Read-only by default &mdash; safe to hand to anyone"
    link:
      url: "https://datasette.io/"
      text: "datasette.io"

  - type: content
    title: "Things I &#10084;&#65039; about Datasette"
    bullets:
      - "Written in Python / Available via pip"
      - "Easy and intuitive to use"
      - "Well-documented"
      - "Useful, large, and growing plugin library"
      - "Built-in API... Using SQL!"
      - "Open source + supportive developer"
      - 'Flexible deployment with <span class="accent">CHEAP</span> hosting options'

  - type: content
    title: "Cincinnati &amp; Hamilton County Public Library"
    background: "#00223D"
    bullets:
      - "~9.6 million volumes (2nd largest public library collection)"
      - "41 locations across Hamilton County"
      - "21+ million items circulated annually"
      - "Main Library: 4M+ items/year (most of any single US location)"
      - "Runs the Sierra ILS"

  - type: content
    title: "The Pipeline"
    code:
      language: text
      body: |
        Sierra ILS
            ↓
        PostgreSQL (Sierra DB)
            ↓
        Python Scripts (sqlite-utils)
            ↓
        SQLite Database
            ↓
        Datasette → collection-analysis.cincy.pl
    link:
      url: "https://github.com/cincinnatilibrary/collection-analysis"
      text: "github.com/cincinnatilibrary/collection-analysis"

  - type: iframe
    title: "Demo Time!"
    url: "https://collection-analysis.cincy.pl/"
    notes: |
      Demo flow: Browse item table → Facet by location → Facet by format →
      Filter to single branch → Custom SQL query → CSV export → JSON API

  - type: content
    title: "Hosting: $5 a Month. Seriously."
    bullets:
      - 'DigitalOcean Droplet: <span class="accent">$5/month</span>'
    sub_bullets:
      - "1 vCPU, 1 GB RAM, 25 GB SSD"
    bullets_after:
      - "Apache reverse proxy (free)"
      - "Let's Encrypt TLS (free)"
      - "Datasette + Python (free, open source)"
    link:
      url: "https://ils-underground.github.io/python_datasette_vps.html"
      text: "Step-by-step guide: ils-underground.github.io"

  - type: content
    title: "Pre-Built Queries for Domain Experts"
    bullets:
      - "Not everyone wants (or needs) to write SQL"
      - 'Datasette supports "canned queries" with parameter inputs'
      - "Examples:"
    sub_bullets:
      - '"Items at [branch] not checked out since [date]"'
      - '"Top circulating titles by [format]"'
      - '"Collection age distribution for [branch]"'
    bullets_after:
      - "Domain experts get answers; developers maintain the queries"

  - type: content
    title: "SQL Example: Location Analysis"
    code:
      language: sql
      body: |
        select
          item.location_code,
          l.location_name,
          l.branch_name,
          count(*) as count_items
        from
          item
          join location_view as l
            on l.location_code = item.location_code
        where branch_name = :branch_name
        group by 1, 2, 3
    notes: |
      Named parameters like :branch_name give users a nice input form
      in Datasette without writing SQL.

  - type: content
    title: "What's New in Datasette (2025-2026)"
    bullets:
      - "Datasette 1.0 alpha series"
      - "<strong>datasette-plot</strong> &mdash; new visualization plugin"
      - "<strong>datasette-extract</strong> &mdash; LLM-powered data extraction"
      - "<strong>Datasette Lite</strong> &mdash; runs entirely in the browser (WebAssembly)"
      - "Simon Willison's NICAR 2026 workshop: coding agents + Datasette"

  - type: content
    title: "Once You Have the Pattern, Everything Is a Dataset"
    bullets:
      - "ILS collection data &#10003;"
      - "Newspaper indexes (Newsdex) &mdash; <em>up next!</em>"
      - "Program attendance"
      - "Website analytics"
      - "Vendor usage statistics"
      - "Budget/purchasing data"
    notes: |
      Tease Talk 2: "We also used this to liberate a century of Cincinnati
      newspaper index data — that's the Newsdex project."

  - type: content
    title: "Try It Yourself &mdash; 5 Minutes"
    code:
      language: bash
      body: |
        # Install
        pip install datasette sqlite-utils

        # Got a CSV? Make it a database.
        sqlite-utils insert my-data.db my_table my-data.csv --csv

        # Enable full-text search
        sqlite-utils enable-fts my-data.db my_table title description

        # Launch
        datasette my-data.db
        # → http://localhost:8001/
    link:
      url: "https://lite.datasette.io/"
      text: "Or try Datasette Lite &mdash; no install needed!"

  - type: content
    title: "Resources"
    links_list:
      - url: "https://datasette.io/"
        text: "datasette.io &mdash; Datasette"
      - url: "https://sqlite-utils.datasette.io/"
        text: "sqlite-utils.datasette.io &mdash; sqlite-utils"
      - url: "https://collection-analysis.cincy.pl/"
        text: "collection-analysis.cincy.pl &mdash; CHPL Collection Analysis (live)"
      - url: "https://github.com/cincinnatilibrary/collection-analysis"
        text: "github.com/cincinnatilibrary/collection-analysis &mdash; Source Code"
      - url: "https://ils-underground.github.io/python_datasette_vps.html"
        text: "ils-underground.github.io &mdash; VPS Hosting Guide"
      - url: "https://datasette.io/tutorials"
        text: "datasette.io/tutorials &mdash; Tutorials"
      - url: "https://simonwillison.net/"
        text: "simonwillison.net &mdash; Simon Willison's Blog"

  - type: closing
    title: "Thanks!"
    body: |
      Please let me know if you come up with any cool queries,
      &#10084;&#65039; Datasette as much as I do,
      or want to use this at your library!
